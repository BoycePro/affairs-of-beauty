<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affairs of Beauty - Business Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Inter', sans-serif;
  }

  .card-wrapper {
    display: flex;
    flex-direction: column;
    gap: 40px;
    align-items: center;
  }

  .card-label {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  /* ====== FRONT OF CARD ====== */
  .card-front {
    width: 1050px;
    height: 600px;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 40%, #1a1a1a 100%);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  }

  /* Subtle texture overlay */
  .card-front::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(242,181,200,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(242,181,200,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Sparkle dots */
  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #F2B5C8;
    border-radius: 50;
    opacity: 0.5;
    box-shadow: 0 0 8px #F2B5C8;
  }
  .sparkle:nth-child(1) { top: 15%; right: 25%; opacity: 0.7; width: 3px; height: 3px; }
  .sparkle:nth-child(2) { top: 40%; right: 15%; opacity: 0.4; }
  .sparkle:nth-child(3) { bottom: 30%; right: 30%; opacity: 0.6; width: 2px; height: 2px; }
  .sparkle:nth-child(4) { top: 25%; left: 15%; opacity: 0.3; width: 2px; height: 2px; }
  .sparkle:nth-child(5) { bottom: 20%; left: 8%; opacity: 0.5; width: 3px; height: 3px; }

  /* Left image - braid */
  .card-img-left {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 120px;
    overflow: hidden;
    mask-image: linear-gradient(to right, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 70%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 70%, transparent 100%);
  }
  .card-img-left img {
    width: 200px;
    height: 100%;
    object-fit: cover;
    object-position: center;
    filter: grayscale(20%) brightness(0.8);
  }

  /* Right image - wig/nails */
  .card-img-right {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 280px;
    overflow: hidden;
    mask-image: linear-gradient(to left, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
    -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
  }
  .card-img-right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: left center;
    filter: grayscale(20%) brightness(0.7);
  }

  /* Content */
  .card-content {
    position: relative;
    z-index: 2;
    padding: 50px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  /* BA Monogram */
  .monogram {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 72px;
    color: #F2B5C8;
    line-height: 1;
    letter-spacing: 4px;
    text-shadow: 0 2px 20px rgba(242,181,200,0.3);
    margin-bottom: 4px;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }

  .slogan {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 16px;
    color: #F2B5C8;
    letter-spacing: 2px;
    margin-bottom: 32px;
    opacity: 0.9;
  }

  /* Divider */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #F2B5C8, transparent);
    margin-bottom: 28px;
  }

  /* Contact info */
  .contact-info {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
    text-align: left;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #e0e0e0;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .contact-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #F2B5C8;
    font-size: 14px;
    flex-shrink: 0;
  }

  .contact-item a {
    color: #e0e0e0;
    text-decoration: none;
  }

  /* Pink accent line at bottom */
  .card-front::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #F2B5C8, transparent);
  }

  /* ====== BACK OF CARD ====== */
  .card-back {
    width: 1050px;
    height: 600px;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 40%, #1a1a1a 100%);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(242,181,200,0.05) 0%, transparent 70%);
  }

  .back-content {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .back-monogram {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 120px;
    color: #F2B5C8;
    line-height: 1;
    letter-spacing: 6px;
    text-shadow: 0 4px 30px rgba(242,181,200,0.2);
    margin-bottom: 10px;
  }

  .back-brand {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .back-slogan {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: #F2B5C8;
    letter-spacing: 3px;
    opacity: 0.8;
  }

  .back-divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #F2B5C8, transparent);
    margin: 16px auto;
  }

  /* Services list on back */
  .services-list {
    display: flex;
    gap: 24px;
    margin-top: 24px;
    justify-content: center;
  }
  .services-list span {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .services-list .dot {
    color: #F2B5C8;
    opacity: 0.5;
  }

  .card-back::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #F2B5C8, transparent);
  }

  /* Print helper */
  @media print {
    body { background: white; }
    .card-label { display: none; }
  }
</style>
</head>
<body>
<div class="card-wrapper">

  <span class="card-label">Front</span>

  <div class="card-front">
    <!-- Sparkles -->
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <!-- Left decorative image -->
    <div class="card-img-left">
      <img src="assets/images/service-braids.jpg" alt="" />
    </div>

    <!-- Right decorative image -->
    <div class="card-img-right">
      <img src="assets/images/service-wigs.jpg" alt="" />
    </div>

    <!-- Card content -->
    <div class="card-content">
      <div class="monogram">BA</div>
      <div class="brand-name">Affairs of Beauty</div>
      <div class="slogan">Where elegance meets expertise</div>
      <div class="divider"></div>
      <div class="contact-info">
        <div class="contact-item">
          <span class="contact-icon">📍</span>
          <span>Florida</span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">📞</span>
          <span>(346) 257-1588</span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">✉️</span>
          <span>hello@affairsofbeauty.com</span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">🌐</span>
          <span>www.affairsofbeauty.com</span>
        </div>
      </div>
    </div>
  </div>

  <span class="card-label">Back</span>

  <div class="card-back">
    <div class="back-content">
      <div class="back-monogram">BA</div>
      <div class="back-brand">Affairs of Beauty</div>
      <div class="back-divider"></div>
      <div class="back-slogan">Where elegance meets expertise</div>
      <div class="services-list">
        <span>Wigs</span>
        <span class="dot">✦</span>
        <span>Braids</span>
        <span class="dot">✦</span>
        <span>Cuts</span>
        <span class="dot">✦</span>
        <span>Nails</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
