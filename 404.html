<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Affairs of Beauty</title>
  <meta name="description" content="The page you're looking for doesn't exist." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Georgia', 'Cambria', '"Times New Roman"', 'Times', 'serif'],
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            gold: '#D4AF37',
            'gold-dark': '#B8963A',
            rose: '#8B4049',
            'rose-dark': '#6D323A',
            'rose-light': '#F4C2C2',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .font-serif { font-family: 'Playfair Display', Georgia, serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 flex items-center justify-center p-4">
  <div class="max-w-2xl text-center">
    <div class="mb-8">
      <div class="inline-block p-6 bg-white/10 backdrop-blur-sm rounded-full mb-6">
        <i data-lucide="search-x" class="w-16 h-16 text-[#F2B5C8]"></i>
      </div>
      <h1 class="font-serif text-6xl md:text-8xl text-white font-bold mb-4">404</h1>
      <h2 class="font-serif text-3xl md:text-4xl text-white font-bold mb-6">Page Not Found</h2>
      <p class="text-white/80 text-lg mb-8 max-w-md mx-auto">
        Oops! The page you're looking for doesn't exist. But don't worry, 
        we have plenty of beautiful services waiting for you.
      </p>
    </div>
    
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="/" class="inline-flex items-center justify-center gap-2 bg-[#F2B5C8] hover:bg-[#E09DB5] text-[#2D2D2D] px-8 py-4 rounded-full text-lg font-semibold uppercase tracking-wide transition-all transform hover:scale-105 shadow-xl">
        <i data-lucide="home" class="w-5 h-5"></i>
        Go Home
      </a>
      <a href="/services" class="inline-flex items-center justify-center gap-2 bg-white/20 hover:bg-white/30 backdrop-blur-sm text-white px-8 py-4 rounded-full text-lg font-semibold uppercase tracking-wide transition-all border border-white/30">
        <i data-lucide="sparkles" class="w-5 h-5"></i>
        View Services
      </a>
    </div>

    <div class="mt-12 pt-8 border-t border-white/20">
      <p class="text-white/60 text-sm mb-4">Quick Links</p>
      <div class="flex flex-wrap justify-center gap-4 text-sm">
        <a href="/about" class="text-white/80 hover:text-[#F2B5C8] transition-colors">About</a>
        <span class="text-white/40">•</span>
        <a href="/gallery" class="text-white/80 hover:text-[#F2B5C8] transition-colors">Gallery</a>
        <span class="text-white/40">•</span>
        <a href="/team" class="text-white/80 hover:text-[#F2B5C8] transition-colors">Team</a>
        <span class="text-white/40">•</span>
        <a href="/contact" class="text-white/80 hover:text-[#F2B5C8] transition-colors">Contact</a>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
